<div class="min-h-screen bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900">
  <!-- Navbar -->
  <nav class="bg-slate-950 border-b border-slate-700 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-16">
        <!-- Logo -->
        <div class="flex-shrink-0">
          <a routerLink="/" class="flex items-center gap-2 hover:opacity-80 transition-opacity">
            <img src="icons/logo.png" alt="miPWA logo" class="w-8 h-8 rounded">
            <span class="text-2xl font-bold bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent">
              {{ "" }}
            </span>
          </a>
        </div>

        <!-- Navigation Links -->
        <div class="hidden md:flex space-x-8">
          <a 
            routerLink="/" 
            routerLinkActive="text-blue-400" 
            [routerLinkActiveOptions]="{ exact: true }"
            class="text-slate-300 hover:text-blue-400 transition-colors duration-200 text-sm font-medium"
          >
            Home
          </a>
          <a 
            routerLink="/nosotros" 
            routerLinkActive="text-blue-400"
            class="text-slate-300 hover:text-blue-400 transition-colors duration-200 text-sm font-medium"
          >
            Nosotros
          </a>
          <a 
            routerLink="/juego" 
            routerLinkActive="text-blue-400"
            class="text-slate-300 hover:text-blue-400 transition-colors duration-200 text-sm font-medium"
          >
            Juego
          </a>

          <a 
            href="/downloads/LEAF_HISTORIES.zip" 
            download
            class="text-slate-300 hover:text-blue-400 transition-colors duration-200 text-sm font-medium"
          >
            Descargar
          </a>
        </div>

        <!-- Mobile menu button -->
        <div class="md:hidden">
          <button 
            (click)="toggleMobileMenu()"
            class="text-slate-300 hover:text-blue-400 transition-colors"
            [attr.aria-expanded]="isMobileMenuOpen()"
            aria-label="Toggle navigation menu"
          >
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
            </svg>
          </button>
        </div>
      </div>
    </div>

    <!-- Mobile Navigation -->
    @if (isMobileMenuOpen()) {
      <div class="md:hidden bg-slate-900 border-t border-slate-700">
        <a 
          routerLink="/" 
          routerLinkActive="bg-slate-700 text-blue-400" 
          [routerLinkActiveOptions]="{ exact: true }"
          (click)="closeMobileMenu()"
          class="block px-4 py-2 text-slate-300 hover:text-blue-400 hover:bg-slate-800 transition-colors"
        >
          Home
        </a>
        <a 
          routerLink="/nosotros" 
          routerLinkActive="bg-slate-700 text-blue-400"
          (click)="closeMobileMenu()"
          class="block px-4 py-2 text-slate-300 hover:text-blue-400 hover:bg-slate-800 transition-colors"
        >
          Nosotros
        </a>
        <a 
          routerLink="/juego" 
          routerLinkActive="bg-slate-700 text-blue-400"
          (click)="closeMobileMenu()"
          class="block px-4 py-2 text-slate-300 hover:text-blue-400 hover:bg-slate-800 transition-colors"
        >
          Juego
        </a>
        <a 
          routerLink="/index" 
          routerLinkActive="bg-slate-700 text-blue-400"
          (click)="closeMobileMenu()"
          class="block px-4 py-2 text-slate-300 hover:text-blue-400 hover:bg-slate-800 transition-colors"
        >
          Index
        </a>
      </div>
    }
  </nav>

  <!-- Main content -->
  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
    <router-outlet></router-outlet>
  </main>
</div>
